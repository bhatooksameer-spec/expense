<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/css/mdb.min.css" rel="stylesheet" />

    <style>
        .container-fluid{
            display: flex;
            /* background-color: aqua; */
            /* width: 80%; */
            justify-content: space-between;
        }
        .first,.second{
            width: 40%;
        }
        
        .first table {
            width: 120%;
            border-radius: 5px;
            text-align: center;
            font-weight: bolder;
            margin-top: 5%;
            box-shadow: 0px 0px 5px 2px rgb(155, 154, 154);
        }
        .second table   {
            border-radius: 5px;
            width: 60%;
            gap: 10px;
            margin-top: 5%;
            text-align: center;
            font-weight: bolder;
            box-shadow: 0px 0px 5px 2px rgb(155, 154, 154);
        }
        .second table tr {
            display: flex;
            width: 80%;
            justify-content: space-between;
            margin-left: 7%;
        }
        select{
            border-radius: 5px;
        }
        .first table tr{
            /* background-color: aqua; */
            display: inline-block;
            width: 100%;
        }
        .first table tr td{
            /* background-color: blanchedalmond; */
            width: 10%;
            text-align: center;
            justify-content: space-between;
        }
        .sno{
            /* background-color: aqua !important; */
            width:3% !important  ;
            text-align: center;
        }
        
    </style>
</head>

<body>
    
    <h1 class="container">Expense Tracker</h1><br>
    <div class="container-fluid">
        <div class="first">
            <table>
                <tr>
                    <td class="sno">S.no</td>
                    <td>Name</td>
                    <td>Amount</td>
                    <td>Type</td>
                    <td>Action</td>
                </tr>
                <tr id="row"></tr>
                
            </table>
        </div>
        <div class="second">
            <table>
                <tr>
                    <td><h7>Entry Type</h7></td>
                    <td>
                        <select name="" id="option">
                            <option value="" disabled selected>Choose Type</option>
                            <option value="Income" >Income</option>
                            <option value="Fees" >Fees</option>
                            <option value="My Rent" >My Rent</option>
                            <option value="Your Rent" >Your Rent</option>
                        </select>
                    </td>
                    
                </tr>
                <tr>
                    <td>Name</td>
                    <td><input type="text" id="Name" placeholder="Enter Name"required></td>
                </tr>
                <tr>
                    <td>Amount</td>
                    <td><input type="number" id="amount" placeholder="0"  required ></td>
                </tr>
                <tr>
                    <td><button onclick="add()" class="btn btn-outline-success">ADD EXPENSE</button></td>
                </tr>
            </table>
        </div>
    </div>








    <script src="app.js"></script>

</body>

</html>
