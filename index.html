
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/css/mdb.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1 class="text-center my-4">Expense Tracker</h1>
  <div class="row">

    <div class="col-md-8">
      <div class="table-responsive">
        <table class="table table-striped table-bordered table-hover">
          <thead>
            <tr>
              <th>S.No.</th>
              <th>Name</th>
              <th>Amount</th>
              <th>Type</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="raw">

          </tbody>
        </table>
      </div>
    </div>

    <div class="col-md-3">
      <div class="form">
        <div>
          <label class="form-label">Enter Type</label>
          <select id="type" class="form-select" required>
            <option value="" disabled selected>Choose Type</option>
            <option value="Income">Income</option>
            <option value="Fees">Fees</option>
            <option value="Rent">Rent</option>
          </select>
        </div>

        <div>
          <label class="form-label">Enter Name</label>
          <input type="text" id="name" class="form-control" placeholder="Enter Name" required>
        </div>

        <div>
          <label class="form-label">Enter Amount</label>
          <input type="number" placeholder="Enter amount" required class="form-control" id="amount">
        </div>

        <button class="btn btn-success btn-sm w-100" onclick="addData()">
          ADD DATA
        </button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/js/mdb.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
